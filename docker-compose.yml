version: "3.9"

services:
  # ── Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: mywebapp:latest
    container_name: webapp_app
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: development
      WORKERS: 2
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mydb
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app  # Hot-reload in dev (remove in prod)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Database ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: webapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: webapp_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: webapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - backend

  # ── Certbot (Let's Encrypt) ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: webapp_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renouvellement auto toutes les 12h
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:

networks:
  backend:
    driver: bridge
