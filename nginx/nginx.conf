worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream app {
        server app:8000;
        keepalive 32;
    }

    # HTTP (dev local — pas de HTTPS)
    server {
        listen 80;
        server_name _;

        location /healthz {
            proxy_pass http://app;
            access_log off;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS — décommente en production avec de vrais certificats
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name ton-domaine.com;
    #     ssl_certificate     /etc/letsencrypt/live/ton-domaine.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/ton-domaine.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ...
    # }
}
